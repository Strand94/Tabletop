name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, typecheck & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Audit dependencies (high+)
        run: npm audit --audit-level=high

  integration:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tabletop
          POSTGRES_PASSWORD: tabletop
          POSTGRES_DB: tabletop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tabletop -d tabletop_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://tabletop:tabletop@localhost:5432/tabletop_test
      RUN_DB_TESTS: '1'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Run integration tests
        run: npx vitest run --project server

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tabletop
          POSTGRES_PASSWORD: tabletop
          POSTGRES_DB: tabletop_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tabletop -d tabletop_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://tabletop:tabletop@localhost:5432/tabletop_e2e
      JWT_SECRET: ci-e2e-access-secret-ci-e2e-access-secret
      JWT_REFRESH_SECRET: ci-e2e-refresh-secret-ci-e2e-refresh-secret
      DB_USER: tabletop
      DB_PASSWORD: tabletop
      DB_NAME: tabletop_e2e
      DEFAULT_CURRENCY: NOK
      DEFAULT_LOCALE: nb
      CLIENT_DIST: ${{ github.workspace }}/apps/client/dist
      PORT: '5470'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Build client and server
        run: |
          npm run build --workspace @tabletop/client
          npm run build --workspace @tabletop/server
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run e2e tests
        run: npx playwright test

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy:
    name: Dependency & config scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

  image:
    name: Build & scan production image (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: tabletop:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: tabletop:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

  # CodeQL SAST is provided by GitHub's default code-scanning setup for this repo,
  # which cannot coexist with an advanced workflow job. Semgrep below adds a
  # second, workflow-controlled SAST pass.

  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v7
      - name: Semgrep scan
        run: semgrep scan --config p/typescript --config p/security-audit --config p/secrets --error
